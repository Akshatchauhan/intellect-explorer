name: Deploy to Hostagle

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      # 1. Get the latest code
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # 2. Install Node.js
      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install Dependencies & Build
      - name: 🔨 Build Project
        run: |
          npm install --legacy-peer-deps
          npm run build

      # 4. Test FTP connectivity before attempting deploy
      - name: 🔍 Test FTP connectivity
        run: |
          echo "Testing port 21..."
          nc -zv -w 10 ftp.intellectexplorer.com 21 && echo "✅ Port 21 reachable" || echo "❌ Port 21 blocked"
          echo "Testing port 990 (FTPS)..."
          nc -zv -w 10 ftp.intellectexplorer.com 990 && echo "✅ Port 990 reachable" || echo "❌ Port 990 blocked"
          echo "DNS lookup:"
          nslookup ftp.intellectexplorer.com

      # 5. Upload to Hostagle via FTP
      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.intellectexplorer.com
          username: icanandiwillsoon2@intellectexplorer.com
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /
          protocol: ftp
          security: loose
          timeout: 60000
          dangerous-clean-slate: true